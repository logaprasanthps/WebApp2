name: Build and publish Docker image to GHCR

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/webapp2:latest
            ghcr.io/${{ github.repository_owner }}/webapp2:${{ github.sha }}

      - name: Output image ref
        run: |
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/webapp2:${{ github.sha }}" >> $GITHUB_ENV
          echo "PUBLISHED: ghcr.io/${{ github.repository_owner }}/webapp2:${{ github.sha }}"
